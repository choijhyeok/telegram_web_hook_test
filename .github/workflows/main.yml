name: Notify Telegram on PR or Merge

on:
  pull_request:
    types: [review_requested, synchronize, closed]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review' ||
      github.event_name == 'pull_request_review_comment' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)

    steps:
      - name: 이벤트 정보 디버깅
        run: |
          echo "=== 이벤트 디버깅 정보 ==="
          echo "Event name: ${{ github.event_name }}"
          echo "Event action: ${{ github.event.action }}"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          echo "========================="

      - name: 사용자 매핑 및 메시지 생성
        id: message
        run: |
          # 작성자
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            AUTHOR="${{ github.event.issue.user.login }}"
          else
            AUTHOR="${{ github.event.pull_request.user.login }}"
          fi

          # 리뷰 요청 알림
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.action }}" = "review_requested" ]; then
            REVIEWER="${{ github.event.pull_request.requested_reviewers[0].login }}"
            REVIEWER="${REVIEWER:-없음}"
            MSG="👀 *리뷰를 요청드립니다\!*
          *작성자*: ${AUTHOR}
          *리뷰어*: ${REVIEWER}
          *PR 제목*: \`${{ github.event.pull_request.title }}\`
          *링크*: ${{ github.event.pull_request.html_url }}"

          # PR 댓글 알림
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENTER="${{ github.event.comment.user.login }}"
            MSG="💬 *댓글이 작성되었습니다\!*
          *댓글 작성자*: ${COMMENTER}
          *PR 제목*: \`${{ github.event.issue.title }}\`
          *PR 작성자*: ${AUTHOR}
          *링크*: ${{ github.event.issue.html_url }}"

          # 리뷰 코멘트 알림
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            COMMENTER="${{ github.event.comment.user.login }}"
            MSG="💬 *리뷰 코멘트가 작성되었습니다\!*
          *작성자*: ${COMMENTER}
          *PR 제목*: \`${{ github.event.pull_request.title }}\`
          *PR 작성자*: ${AUTHOR}
          *링크*: ${{ github.event.comment.html_url }}"

          # 리뷰 승인 알림
          elif [ "${{ github.event_name }}" = "pull_request_review" ] && [ "${{ github.event.review.state }}" = "approved" ]; then
            REVIEWER="${{ github.event.review.user.login }}"
            MSG="✅ *리뷰가 승인되었습니다\!*
          *리뷰어*: ${REVIEWER}
          *PR 제목*: \`${{ github.event.pull_request.title }}\`
          *작성자*: ${AUTHOR}
          *링크*: ${{ github.event.pull_request.html_url }}"

          # PR 머지 알림
          elif [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.action }}" = "closed" ] && [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            MERGER="${{ github.event.pull_request.merged_by.login }}"
            MSG="🎉 *PR이 머지되었습니다\!*
          *머지한 사람*: ${MERGER}
          *작성자*: ${AUTHOR}
          *제목*: \`${{ github.event.pull_request.title }}\`
          *링크*: ${{ github.event.pull_request.html_url }}"

          else
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT

          # 멀티라인 메시지를 GITHUB_OUTPUT에 저장
          {
            echo "text<<EOFMSG"
            echo "$MSG"
            echo "EOFMSG"
          } >> $GITHUB_OUTPUT

      - name: Telegram 알림 전송
        if: steps.message.outputs.skip != 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="MarkdownV2" \
            --data-urlencode "text=${{ steps.message.outputs.text }}"
