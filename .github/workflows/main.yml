name: Notify Telegram on PR or Merge

on:
  pull_request:
    types: [review_requested, synchronize, closed]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  push:
    branches: [dev, main]

jobs:
  notify-pr:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review' ||
      github.event_name == 'pull_request_review_comment' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)

    steps:
      - name: 리뷰 요청 알림
        if: github.event_name == 'pull_request' && github.event.action == 'review_requested'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="👀 <b>리뷰를 요청드립니다!</b>
          <b>작성자</b>: <code>${{ github.event.pull_request.user.login }}</code>
          <b>리뷰어</b>: <code>${{ github.event.pull_request.requested_reviewers[0].login }}</code>
          <b>PR 제목</b>: <code>${{ github.event.pull_request.title }}</code>
          <b>링크</b>: ${{ github.event.pull_request.html_url }}"

      - name: PR 코드 푸시(동기화) 알림
        if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="🔄 <b>PR에 새 커밋이 푸시되었습니다!</b>
          <b>작성자</b>: <code>${{ github.event.pull_request.user.login }}</code>
          <b>PR 제목</b>: <code>${{ github.event.pull_request.title }}</code>
          <b>링크</b>: ${{ github.event.pull_request.html_url }}"

      - name: PR 댓글 알림
        if: github.event_name == 'issue_comment'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="💬 <b>댓글이 작성되었습니다!</b>
          <b>댓글 작성자</b>: <code>${{ github.event.comment.user.login }}</code>
          <b>PR 제목</b>: <code>${{ github.event.issue.title }}</code>
          <b>PR 작성자</b>: <code>${{ github.event.issue.user.login }}</code>
          <b>링크</b>: ${{ github.event.comment.html_url }}"

      - name: 리뷰 코멘트 알림
        if: github.event_name == 'pull_request_review_comment'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="📝 <b>리뷰 코멘트가 작성되었습니다!</b>
          <b>코멘트 작성자</b>: <code>${{ github.event.comment.user.login }}</code>
          <b>PR 제목</b>: <code>${{ github.event.pull_request.title }}</code>
          <b>PR 작성자</b>: <code>${{ github.event.pull_request.user.login }}</code>
          <b>링크</b>: ${{ github.event.comment.html_url }}"

      - name: 리뷰 승인 알림
        if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>리뷰가 승인되었습니다!</b>
          <b>리뷰어</b>: <code>${{ github.event.review.user.login }}</code>
          <b>PR 제목</b>: <code>${{ github.event.pull_request.title }}</code>
          <b>작성자</b>: <code>${{ github.event.pull_request.user.login }}</code>
          <b>링크</b>: ${{ github.event.pull_request.html_url }}"

      - name: 리뷰 변경 요청 알림
        if: github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="🔁 <b>변경 요청이 있습니다!</b>
          <b>리뷰어</b>: <code>${{ github.event.review.user.login }}</code>
          <b>PR 제목</b>: <code>${{ github.event.pull_request.title }}</code>
          <b>작성자</b>: <code>${{ github.event.pull_request.user.login }}</code>
          <b>링크</b>: ${{ github.event.pull_request.html_url }}"

      - name: PR 머지 알림
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="🎉 <b>PR이 머지되었습니다!</b>
          <b>머지한 사람</b>: <code>${{ github.event.pull_request.merged_by.login }}</code>
          <b>작성자</b>: <code>${{ github.event.pull_request.user.login }}</code>
          <b>제목</b>: <code>${{ github.event.pull_request.title }}</code>
          <b>링크</b>: ${{ github.event.pull_request.html_url }}"

  notify-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Push 알림
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="📦 <b>Push 알림</b>
          <b>브랜치</b>: <code>${{ github.ref_name }}</code>
          <b>커밋 작성자</b>: <code>${{ github.event.head_commit.author.username }}</code>
          <b>커밋 메시지</b>: <code>${{ github.event.head_commit.message }}</code>
          <b>링크</b>: ${{ github.event.head_commit.url }}"
