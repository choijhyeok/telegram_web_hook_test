name: Notify Telegram on PR or Merge

on:
  pull_request:
    types: [review_requested, synchronize, closed]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review' ||
      github.event_name == 'pull_request_review_comment' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)

    steps:
      - name: 이벤트 정보 디버깅
        run: |
          echo "=== 이벤트 디버깅 정보 ==="
          echo "Event name: ${{ github.event_name }}"
          echo "Event action: ${{ github.event.action }}"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          echo "========================="

      - name: 메시지 생성 및 Telegram 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 작성자
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            AUTHOR="${{ github.event.issue.user.login }}"
          else
            AUTHOR="${{ github.event.pull_request.user.login }}"
          fi

          MSG=""

          # 리뷰 요청 알림
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.action }}" = "review_requested" ]; then
            REVIEWER="${{ github.event.pull_request.requested_reviewers[0].login }}"
            REVIEWER="${REVIEWER:-없음}"
            MSG="👀 <b>리뷰를 요청드립니다!</b>
          <b>작성자</b>: ${AUTHOR}
          <b>리뷰어</b>: ${REVIEWER}
          <b>PR 제목</b>: <code>${{ github.event.pull_request.title }}</code>
          <b>링크</b>: ${{ github.event.pull_request.html_url }}"

          # PR 댓글 알림
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENTER="${{ github.event.comment.user.login }}"
            MSG="💬 <b>댓글이 작성되었습니다!</b>
          <b>댓글 작성자</b>: ${COMMENTER}
          <b>PR 제목</b>: <code>${{ github.event.issue.title }}</code>
          <b>PR 작성자</b>: ${AUTHOR}
          <b>링크</b>: ${{ github.event.issue.html_url }}"

          # 리뷰 코멘트 알림
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            COMMENTER="${{ github.event.comment.user.login }}"
            MSG="💬 <b>리뷰 코멘트가 작성되었습니다!</b>
          <b>작성자</b>: ${COMMENTER}
          <b>PR 제목</b>: <code>${{ github.event.pull_request.title }}</code>
          <b>PR 작성자</b>: ${AUTHOR}
          <b>링크</b>: ${{ github.event.comment.html_url }}"

          # 리뷰 승인 알림
          elif [ "${{ github.event_name }}" = "pull_request_review" ] && [ "${{ github.event.review.state }}" = "approved" ]; then
            REVIEWER="${{ github.event.review.user.login }}"
            MSG="✅ <b>리뷰가 승인되었습니다!</b>
          <b>리뷰어</b>: ${REVIEWER}
          <b>PR 제목</b>: <code>${{ github.event.pull_request.title }}</code>
          <b>작성자</b>: ${AUTHOR}
          <b>링크</b>: ${{ github.event.pull_request.html_url }}"

          # PR 머지 알림
          elif [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.action }}" = "closed" ] && [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            MERGER="${{ github.event.pull_request.merged_by.login }}"
            MSG="🎉 <b>PR이 머지되었습니다!</b>
          <b>머지한 사람</b>: ${MERGER}
          <b>작성자</b>: ${AUTHOR}
          <b>제목</b>: <code>${{ github.event.pull_request.title }}</code>
          <b>링크</b>: ${{ github.event.pull_request.html_url }}"

          else
            echo "No matching event. Skipping."
            exit 0
          fi

          # Telegram 전송
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$MSG" \
              '{chat_id: $chat_id, text: $text, parse_mode: "HTML"}')")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Telegram API 호출 실패 (HTTP $HTTP_CODE)"
            exit 1
          fi
